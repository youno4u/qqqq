<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>폭풍의 증권시장</title>
<style>
  :root{
    --bg:#0B0E13; --panel:#12161D; --panel2:#181D26; --line:#262C38;
    --txt:#E8EAED; --txt2:#8A93A3; --txt3:#5B6472;
    --up:#2ECC71; --down:#E85D4A; --amber:#F0A93C; --amber-d:#3A2A10;
    --mono:'SF Mono','Consolas',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,'Pretendard','Malgun Gothic',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  textarea,input,select{font-family:inherit;}
  .wrap{max-width:1100px;margin:0 auto;padding:20px;}
  .center-wrap{max-width:480px;margin:0 auto;padding:20px;}

  .landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:28px;padding:24px;}
  .logo{font-size:15px;letter-spacing:6px;color:var(--amber);font-weight:700;}
  .title{font-size:30px;font-weight:700;margin:0;}
  .sub{color:var(--txt2);font-size:14px;margin-top:-14px;}
  .roomrow{display:flex;gap:8px;align-items:center;}
  .roomrow input{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:10px 14px;border-radius:8px;font-size:15px;width:180px;text-align:center;letter-spacing:2px;}
  .roles{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:420px;}
  .role-btn{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 10px;color:var(--txt);display:flex;flex-direction:column;align-items:center;gap:8px;}
  .role-btn:active{border-color:var(--amber);}
  .role-btn .ico{font-size:26px;}
  .role-btn .name{font-size:14px;font-weight:600;}
  .role-btn .desc{font-size:11px;color:var(--txt3);}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 4px;border-bottom:1px solid var(--line);margin-bottom:18px;gap:8px;flex-wrap:wrap;}
  .topbar .tag{font-size:12px;color:var(--txt3);letter-spacing:1px;}
  .topbar .back{color:var(--txt2);font-size:13px;background:none;border:none;}
